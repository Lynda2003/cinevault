<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineVault - Découvrez les meilleurs films</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="header">
      <div class="container header-content">
        <div class="logo">
          <span class="logo-icon">🎬</span>
          <h1>CineVault</h1>
        </div>
        <nav class="nav">
          <button
            id="themeToggle"
            class="theme-toggle"
            aria-label="Toggle theme"
          >
            <span class="theme-icon">🌙</span>
          </button>
        </nav>
      </div>
    </header>

    <main class="main">
      <section class="hero">
        <div class="container">
          <h2 class="hero-title">Découvrez le cinéma mondial</h2>
          <p class="hero-subtitle">
            Explorez les films les plus populaires, les mieux notés et trouvez
            vos prochaines pépites
          </p>

          <div class="search-container">
            <input
              type="text"
              id="searchInput"
              class="search-input"
              placeholder="Rechercher un film..."
              autocomplete="off"
            />
            <button id="searchBtn" class="search-btn">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
              </svg>
            </button>
          </div>
        </div>
      </section>

      <section class="movies-section">
        <div class="container">
          <div class="section-header">
            <h3 id="sectionTitle" class="section-title">Films Populaires</h3>
            <div class="filter-buttons">
              <button class="filter-btn active" data-category="popular">
                Populaires
              </button>
              <button class="filter-btn" data-category="top_rated">
                Mieux notés
              </button>
              <button class="filter-btn" data-category="upcoming">
                À venir
              </button>
            </div>
          </div>

          <div id="moviesGrid" class="movies-grid">
            <!-- Les films seront injectés ici par JavaScript -->
          </div>

          <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Chargement...</p>
          </div>

          <div id="noResults" class="no-results hidden">
            <span class="no-results-icon">🎬</span>
            <h4>Aucun film trouvé</h4>
            <p>Essayez avec d'autres termes de recherche</p>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <p>
          &copy; 2026 CineVault. Projet étudiant - Données fournies par
          <a href="https://www.themoviedb.org/" target="_blank">TMDB</a>
        </p>
      </div>
    </footer>

    <script src="js/app.js"></script>
  </body>
</html>
